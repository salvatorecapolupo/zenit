<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUDGET_PRO_TAG_SYSTEM</title>
    <style>
        :root { --main: #00ff41; --bg: #050505; --warn: #ff3e3e; --dim: #1a1a1a; --tag-bg: #222; }
        body { background: var(--bg); color: var(--main); font-family: 'Consolas', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Grafico Specchiato */
        #chart-area { height: 45%; padding: 40px; display: flex; align-items: center; gap: 3px; position: relative; background: #000; border-bottom: 1px solid var(--dim); }
        .bar-container { flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .bar { width: 100%; transition: all 0.3s; position: relative; }
        .val-label { position: absolute; left: 50%; transform: translateX(-50%); font-size: 9px; white-space: nowrap; font-weight: bold; }
        .date-label { position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%) rotate(-90deg); font-size: 10px; color: #555; }
        .axis-zero { position: absolute; width: 100%; height: 1px; background: rgba(255,255,255,0.3); left: 0; top: 50%; z-index: 1; }

        /* Console e Tag */
        #console { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 10px; border-bottom: 1px solid var(--dim); }
        .tag { background: var(--tag-bg); border: 1px solid var(--main); padding: 5px 10px; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .tag span[contenteditable] { border-bottom: 1px dashed #666; outline: none; min-width: 20px; }
        .tag .remove { color: var(--warn); cursor: pointer; font-weight: bold; padding: 0 4px; }
        .tag .type-icon { font-size: 10px; padding: 2px 4px; background: var(--dim); border-radius: 3px; }

        /* Terminale */
        .terminal-input { padding: 20px; background: #111; display: flex; align-items: center; }
        #cli { background: transparent; border: none; color: var(--main); outline: none; flex-grow: 1; font-family: inherit; font-size: 1.2rem; margin-left: 10px; }
    </style>
</head>
<body>

<div id="chart-area">
    <div class="axis-zero"></div>
</div>

<div id="console">
    </div>

<div class="terminal-input">
    <span>[CMD]></span>
    <input type="text" id="cli" autofocus autocomplete="off" spellcheck="false" placeholder="SALDO 1500, FISSO 13 -30, SPESA 25/04 -200...">
</div>

<script>
    let saldoIniziale = 0;
    let movimenti = []; // { id, tipo, data, cifra, nome }

    const cli = document.getElementById('cli');
    const consoleBox = document.getElementById('console');
    const chart = document.getElementById('chart-area');

    function update() {
        renderTags();
        renderChart();
    }

    function renderTags() {
        consoleBox.innerHTML = '';
        // Mostra saldo come primo tag speciale
        const sTag = document.createElement('div');
        sTag.className = 'tag';
        sTag.innerHTML = `<span>SALDO:</span> <span contenteditable="true" onblur="updateSaldo(this)">${saldoIniziale}</span> €`;
        consoleBox.appendChild(sTag);

        movimenti.forEach((m, index) => {
            const t = document.createElement('div');
            t.className = 'tag';
            t.innerHTML = `
                <span class="type-icon">${m.tipo}</span>
                <span contenteditable="true" onblur="editMov(${index}, 'n', this.innerText)">${m.nome}</span>: 
                <span contenteditable="true" onblur="editMov(${index}, 'i', this.innerText)">${m.i}</span> € 
                <small>(${m.d})</small>
                <span class="remove" onclick="removeMov(${index})">×</span>
            `;
            consoleBox.appendChild(t);
        });
    }

    function updateSaldo(el) {
        saldoIniziale = parseFloat(el.innerText) || 0;
        renderChart();
    }

    function editMov(idx, field, val) {
        if(field === 'i') movimenti[idx].i = parseFloat(val) || 0;
        else movimenti[idx].n = val;
        renderChart();
    }

    function removeMov(idx) {
        movimenti.splice(idx, 1);
        update();
    }

    function renderChart() {
        chart.innerHTML = '<div class="axis-zero"></div>';
        let rolling = saldoIniziale;
        const oggi = new Date();
        let proiezioni = [];

        for(let i=0; i<90; i++) {
            let d = new Date(); d.setDate(oggi.getDate() + i);
            let gM = d.getDate();
            let dS = d.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'});

            movimenti.forEach(m => {
                if(m.tipo === 'FISSO' && gM === parseInt(m.d)) rolling += m.i;
                if(m.tipo === 'SPESA' && dS === m.d) rolling += m.i;
            });
            proiezioni.push(rolling);
        }

        let maxVal = Math.max(...proiezioni.map(Math.abs), 100) * 1.3;

        proiezioni.forEach((val, idx) => {
            const container = document.createElement('div');
            container.className = 'bar-container';

            const bar = document.createElement('div');
            bar.className = 'bar';
            let h = (Math.abs(val) / maxVal) * 50; // 50% max perché siamo specchiati
            bar.style.height = h + '%';
            
            const label = document.createElement('div');
            label.className = 'val-label';
            label.innerText = Math.round(val);

            if(val >= 0) {
                bar.style.backgroundColor = 'var(--main)';
                bar.style.alignSelf = 'flex-end';
                label.style.bottom = '105%';
                container.style.justifyContent = 'flex-start';
                container.appendChild(bar);
                bar.appendChild(label);
            } else {
                bar.style.backgroundColor = 'var(--warn)';
                bar.style.alignSelf = 'flex-start';
                label.style.top = '105%';
                container.style.justifyContent = 'flex-end';
                container.appendChild(bar);
                bar.appendChild(label);
            }

            if(idx % 10 === 0) {
                let dL = new Date(); dL.setDate(oggi.getDate() + idx);
                let lbl = document.createElement('span');
                lbl.className = 'date-label';
                lbl.innerText = dL.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'});
                container.appendChild(lbl);
            }
            chart.appendChild(container);
        });
    }

    cli.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const raw = cli.value.trim();
        const p = raw.split(' ');
        const cmd = p[0].toUpperCase();
        cli.value = '';

        if (cmd === 'SALDO' && p[1]) {
            saldoIniziale = parseFloat(p[1]);
        } 
        else if (cmd === 'FISSO' && p[1] && p[2]) {
            movimenti.push({ tipo: 'FISSO', d: p[1], i: parseFloat(p[2]), nome: 'Ricorrente' });
        } 
        else if (cmd === 'SPESA' && p[1] && p[2]) {
            movimenti.push({ tipo: 'SPESA', d: p[1], i: parseFloat(p[2]), nome: 'Uscita' });
        } 
        else if (cmd === 'RESET') {
            saldoIniziale = 0; movimenti = [];
        } else {
            return; // Ignora comandi errati
        }
        update();
    });

    update();
</script>
</body>
</html>
